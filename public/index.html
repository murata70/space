<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>PROJECT: space - Base</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: radial-gradient(ellipse at bottom, #1B2735 0%, #090A0F 100%);
            height: 100vh;
            color: white;
            font-family: 'sans-serif';
        }

        /* 弾幕メッセージの設定 */
        .danmaku-text {
            position: absolute;
            white-space: nowrap;
            /* サイズを少し小さく修正 (3rem -> 2rem) */
            font-size: 2rem;
            font-weight: bold;
            z-index: 9999;
            pointer-events: none;
            animation: moveSide 15s linear infinite;
        }

        /* 星やアニメーションの設定（変更なし） */
        .scrolling-asset {
            position: absolute;
            width: 33px;
            z-index: 10;
            animation: moveSide 30s linear forwards;
        }

        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            z-index: 1;
            animation: blink 2s infinite ease-in-out;
        }

        @keyframes moveSide {
            from {
                transform: translateX(100vw);
            }

            to {
                transform: translateX(-200vw);
            }
        }

        @keyframes blink {
            0%, 100% {
                opacity: 0.3;
            }

            50% {
                opacity: 1;
            }
        }
    </style>
</head>
<body>

    <div id="member-scripts"></div>

    <script>
        // --- 1. 設定：参加メンバーの名前をここに追加 ---
        const members = ['murata', 'ikemoto', 'koba', 'toshikuni', 'nakahara','okumura'];

        // --- 2. 星の点々生成（省略せずそのまま残してください） ---
        for (let i = 0; i < 100; i++) {
            const star = document.createElement('div');
            star.className = 'star';
            const size = Math.random() * 2;
            star.style.width = size + 'px';
            star.style.height = size + 'px';
            star.style.top = Math.random() * 100 + 'vh';
            star.style.left = Math.random() * 100 + 'vw';
            document.body.appendChild(star);
        }

        // --- 3. イラスト（星や惑星）を流す ---
        const assetPaths = [
            "./assets/image/star_sample.svg",
            "./assets/image/260424_Sample2.svg" // これが大きい惑星
        ];

        function createScrollingAsset() {
            const img = document.createElement('img');

            const randomIndex = Math.floor(Math.random() * assetPaths.length);
            const selectedPath = assetPaths[randomIndex];
            img.src = selectedPath;
            img.className = 'scrolling-asset';

            // ★大きい惑星（Sample2）用の特別ルール
            if (selectedPath.includes('260424_Sample2.svg')) {
                // サイズを大きくする（例：横幅150px、縦幅は自動）
                img.style.width = '150px';
                img.style.height = 'auto';

                // スピードを遅くする（例：60秒かけてゆっくり移動）
                img.style.animationDuration = '60s';

                // 弾幕（z-index: 9999）より奥、普通の星（z-index: 10）より手前に（例：z-index: 50）
                img.style.zIndex = '50';

                // 出現する高さを少し限定する（真ん中あたり 20% ～ 70%）
                img.style.top = (20 + Math.random() * 50) + 'vh';

                // 少し透明にして、弾幕の邪魔をしないようにする（お好みで）
                // img.style.opacity = '0.8'; 
            } else {
                // 通常の星（star_sample）はそのままの設定
                img.style.width = '33px';
                img.style.height = 'auto';
                img.style.animationDuration = '30s';
                img.style.zIndex = '10';
                img.style.top = (Math.random() * 90) + 'vh';
            }

            img.addEventListener('animationend', () => {
                img.remove();

                // 惑星が出た後は、次のイラストまで少し間隔を空ける（5秒〜10秒）
                const isPlanet = selectedPath.includes('260424_Sample2.svg');
                const nextDelay = isPlanet ? (5000 + Math.random() * 5000) : (1000 + Math.random() * 2000);
                setTimeout(createScrollingAsset, nextDelay);
            });

            document.body.appendChild(img);
        }

        // 最初の一歩（星をいくつか先に流しておく）
        createScrollingAsset();
        setTimeout(createScrollingAsset, 2000);
        // 惑星を早めに1つ流してみる
        setTimeout(createScrollingAsset, 5000);

        // --- 4. 弾幕生成システム（レーン制御版） ---
        const laneCount = 18;// 画面を10個のレーンに分ける
        const lanes = new Array(laneCount).fill(false); // レーンが使用中かどうかのフラグ

        function spawnDanmaku(text, color, delay) {
            setTimeout(() => {
                // 空いているレーンをランダムに探す
                let laneIndex;
                let attempts = 0;
                do {
                    laneIndex = Math.floor(Math.random() * laneCount);
                    attempts++;
                } while (lanes[laneIndex] && attempts < 20); // 使用中なら別のレーンを探す

                // レーンを「使用中」にする
                lanes[laneIndex] = true;

                const span = document.createElement('span');
                span.innerText = text;
                span.className = 'danmaku-text';

                // レーンの高さ計算 (上から 10% ～ 90% の間に配置)
                const topPosition = 10 + (laneIndex * (80 / laneCount));
                span.style.top = topPosition + 'vh';
                span.style.color = color;
                span.style.textShadow = `0 0 15px ${color}`;

                document.body.appendChild(span);

                // 15秒（アニメーション時間）経ったらレーンを解放する
                setTimeout(() => {
                    lanes[laneIndex] = false;
                }, 15000);

                // 次のループの時も新しいレーンを再計算する
                span.addEventListener('animationiteration', () => {
                    lanes[laneIndex] = false; // 前のレーンを空ける

                    let newLane;
                    do {
                        newLane = Math.floor(Math.random() * laneCount);
                    } while (lanes[newLane]);

                    laneIndex = newLane;
                    lanes[laneIndex] = true;
                    span.style.top = (10 + (laneIndex * (80 / laneCount))) + 'vh';
                });
            }, delay);
        }

        // --- 5. 各メンバーの設定を読み込んで実行 ---
        window.addEventListener('DOMContentLoaded', () => {
            let totalMessageCount = 0;

            members.forEach((name) => {
                const script = document.createElement('script');
                script.src = `../src/main/messages/${name}.js`;

                script.onload = () => {
                    const config = window[`${name}Config`];
                    if (config && config.messages) {
                        config.messages.forEach((msg) => {
                            const myColor = config.color || '#00ffcc';
                            // 出現タイミングを少しバラけさせる（3秒間隔）
                            spawnDanmaku(msg, myColor, totalMessageCount * 3000);
                            totalMessageCount++;
                        });
                    }
                };
                document.getElementById('member-scripts').appendChild(script);
            });
        });
    </script>
</body>
</html>
