<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8" />
    <!-- タイトルはお好みに合わせて変更してください -->
    <title>SPACE WALLPAPER - React App</title>

    <!-- レスポンシブ対応のためのメタタグ（追加推奨） -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!--
      以前ここに書き込まれていた<style>（CSS）はすべて削除しました。
      今後は Home.css や wallpaper.css など、それぞれのJSXに対応する
      CSSファイルでデザインを管理します。
    -->
</head>
<body>
    <!--
       以前ここに描写されていた <div id="member-scripts"> や、
      <script>（JavaScript）はすべて削除しました。
    -->
    <!--
      【最重要】Reactはこの "root" という場所に、
      JavaScript（JSX）で生成した画面を流し込みます。
      <body>の中身は、これだけにしてください。
    -->
    <div id="root"></div>

</body>
</html>
