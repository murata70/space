<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>PROJECT: space - Base</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            /* 深みのある宇宙の背景 */
            background: radial-gradient(ellipse at bottom, #1B2735 0%, #090A0F 100%);
            height: 100vh;
        }

        /* 流れるイラストのスタイル */
        .scrolling-asset {
            position: absolute;
            /* ★サイズは「いい感じ」だった33pxを維持 */
            width: 33px;
            height: auto;
            z-index: 10;
            /* ★速度を3倍ゆっくりに（10s → 30sに変更） */
            /* forwardsを指定することで、アニメーション終了後も位置を保持（スクリプトで消すまで） */
            animation: moveSide 30s linear forwards;
        }

        /* 右端(100vw)から左端の外(-100px)までゆっくり動かす */
        @keyframes moveSide {
            from {
                transform: translateX(100vw);
            }

            to {
                transform: translateX(-100px);
            }
        }

        /* 背景の固定された小さな星 */
        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            z-index: 1;
            animation: blink 2s infinite ease-in-out;
        }

        @keyframes blink {
            0%, 100% {
                opacity: 0.3;
            }

            50% {
                opacity: 1;
            }
        }
    </style>
</head>
<body>

    <script>
        // 画像のパス（ファイル名はアンダーバー版にしています）
        const assetPath = "./assets/image/star_sample.svg";

        function createScrollingAsset() {
            // 1. 前のイラストが画面外へ消えたら削除
            const oldAsset = document.querySelector('.scrolling-asset');
            if (oldAsset) {
                oldAsset.remove();
            }

            // 2. 新しいイラストを作成
            const img = document.createElement('img');
            img.src = assetPath;
            img.className = 'scrolling-asset';

            // ★出現する場所（高さ）を0%〜90%の間でランダムに決定
            // これにより、毎回違う高さから流れてきます
            const randomY = Math.random() * 90;
            img.style.top = randomY + 'vh';

            // 3. アニメーション終了（画面左端へ到達）を検知
            img.addEventListener('animationend', () => {
                // 次のイラストが出るまでの「間」を少し置く（1.5秒）
                setTimeout(createScrollingAsset, 1500);
            });

            // 4. 画面に追加
            document.body.appendChild(img);
        }

        // 最初の一個目をスタート
        createScrollingAsset();


        // --- 背景の星100個（チカチカ用） ---
        for (let i = 0; i < 100; i++) {
            const star = document.createElement('div');
            star.className = 'star';
            const size = Math.random() * 2;
            star.style.width = size + 'px';
            star.style.height = size + 'px';
            star.style.top = Math.random() * 100 + 'vh';
            star.style.left = Math.random() * 100 + 'vw';
            star.style.animationDelay = Math.random() * 2 + 's';
            document.body.appendChild(star);
        }
    </script>
</body>
</html>
